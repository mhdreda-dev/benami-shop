<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BEN AMI SHOP — Inscription</title>
  <link rel="stylesheet" href="assets/style.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:#f4f6fb; }
    .auth-card {
      background:#fff; border-radius:14px; box-shadow:0 4px 32px rgba(0,0,0,.10);
      padding:2.5rem 2rem; width:100%; max-width:420px;
    }
    .auth-card h1 { text-align:center; margin-bottom:.3rem; font-size:1.6rem; color:#1a1a2e; }
    .auth-card p.sub { text-align:center; color:#888; margin-bottom:2rem; font-size:.9rem; }
    .form-group { margin-bottom:1.2rem; }
    .form-group label { display:block; margin-bottom:.4rem; font-weight:600; color:#333; font-size:.9rem; }
    .form-group input, .form-group select {
      width:100%; padding:.75rem 1rem; border:1.5px solid #dde1eb; border-radius:8px;
      font-size:1rem; transition:border .2s; box-sizing:border-box; background:#fff;
    }
    .form-group input:focus, .form-group select:focus { border-color:#4f46e5; outline:none; }
    .btn-primary {
      width:100%; padding:.8rem; background:#4f46e5; color:#fff; border:none;
      border-radius:8px; font-size:1rem; font-weight:700; cursor:pointer; transition:background .2s;
    }
    .btn-primary:hover { background:#3730a3; }
    .btn-primary:disabled { background:#a5b4fc; cursor:not-allowed; }
    .msg { margin-top:1rem; text-align:center; font-size:.9rem; padding:.6rem; border-radius:6px; display:none; }
    .msg.error { background:#fee2e2; color:#b91c1c; display:block; }
    .msg.success { background:#dcfce7; color:#15803d; display:block; }
    .auth-footer { text-align:center; margin-top:1.5rem; font-size:.9rem; color:#666; }
    .auth-footer a { color:#4f46e5; text-decoration:none; font-weight:600; }
    .logo { text-align:center; font-size:2rem; margin-bottom:.5rem; }
    .hint { font-size:.78rem; color:#999; margin-top:.25rem; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="logo">👟</div>
    <h1>Créer un compte</h1>
    <p class="sub">Rejoignez Ben Ami Shop</p>

    <div class="form-group">
      <label for="name">Nom complet</label>
      <input type="text" id="name" placeholder="Mohamed Reda" autocomplete="name" />
    </div>
    <div class="form-group">
      <label for="email">Adresse e-mail</label>
      <input type="email" id="email" placeholder="vous@exemple.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" placeholder="Min. 6 caractères" />
      <div class="hint">Au moins 6 caractères.</div>
    </div>
    <div class="form-group">
      <label for="confirm">Confirmer le mot de passe</label>
      <input type="password" id="confirm" placeholder="••••••••" />
    </div>
    <div class="form-group">
      <label for="role">Rôle</label>
      <select id="role">
        <option value="user">Utilisateur</option>
        <option value="admin">Administrateur</option>
      </select>
    </div>

    <button class="btn-primary" id="btnRegister">Créer le compte</button>
    <div class="msg" id="msg"></div>

    <div class="auth-footer">
      Déjà un compte ? <a href="login.html">Se connecter</a>
    </div>
  </div>

  <script>
    document.getElementById('btnRegister').addEventListener('click', async () => {
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      const role     = document.getElementById('role').value;
      const msg      = document.getElementById('msg');
      const btn      = document.getElementById('btnRegister');

      msg.className   = 'msg';
      msg.textContent = '';

      if (!name || !email || !password || !confirm) {
        msg.className   = 'msg error';
        msg.textContent = 'Veuillez remplir tous les champs.';
        return;
      }
      if (password.length < 6) {
        msg.className   = 'msg error';
        msg.textContent = 'Le mot de passe doit contenir au moins 6 caractères.';
        return;
      }
      if (password !== confirm) {
        msg.className   = 'msg error';
        msg.textContent = 'Les mots de passe ne correspondent pas.';
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Création…';

      try {
        const res  = await fetch('/api/register', {
          method : 'POST',
          headers: { 'Content-Type': 'application/json' },
          body   : JSON.stringify({ name, email, password, role })
        });
        const data = await res.json();

        if (!res.ok) {
          msg.className   = 'msg error';
          msg.textContent = data.error || 'Erreur lors de l\'inscription.';
        } else {
          msg.className   = 'msg success';
          msg.textContent = 'Compte créé ! Redirection vers la connexion…';
          setTimeout(() => { window.location.href = '/login.html'; }, 1200);
        }
      } catch (e) {
        msg.className   = 'msg error';
        msg.textContent = 'Erreur réseau. Réessayez.';
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Créer le compte';
      }
    });
  </script>
</body>
</html>
