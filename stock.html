<!DOCTYPE html>
<!-- BEN AMI SHOP — stock.html v3 — Architecture SaaS (AppStore) -->
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion stock — Ben Ami Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .stock-toolbar { display:flex; align-items:center; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
    .stock-toolbar .toolbar-search { max-width:280px; }
    .stock-card.has-out { border-color:rgba(239,68,68,.25); }
    .stock-card.has-low { border-color:rgba(234,179,8,.2); }
    .stock-loading { grid-column:1/-1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:4rem; color:var(--text-muted); gap:1rem; }
    .stock-loading i { font-size:2rem; }
    .btn-refresh { display:flex; align-items:center; gap:6px; padding:7px 14px; background:var(--surface-2); border:1px solid var(--border-2); border-radius:8px; color:var(--text-muted); font-size:.82rem; font-weight:600; cursor:pointer; font-family:inherit; transition:all .15s; }
    .btn-refresh:hover { border-color:var(--accent,#f97316); color:var(--accent,#f97316); }
    .btn-refresh.loading i { animation:spin .8s linear infinite; }
    @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
    .sync-badge { display:inline-flex; align-items:center; gap:6px; font-size:.72rem; color:var(--text-dim); padding:4px 10px; background:rgba(34,197,94,.08); border:1px solid rgba(34,197,94,.2); border-radius:999px; }
    .sync-dot { width:6px; height:6px; border-radius:50%; background:#22c55e; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  </style>
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-wrapper">
    <header class="topbar" id="topbar"></header>
    <main class="page-content">

      <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">
        <div>
          <h1>Gestion du stock</h1>
          <p>Ajustez les quantités par taille — synchronisé en temps réel avec PostgreSQL</p>
        </div>
        <div class="sync-badge"><span class="sync-dot"></span> Temps réel · PostgreSQL</div>
      </div>

      <div class="stock-toolbar">
        <div class="toolbar-search">
          <i class="fas fa-search"></i>
          <input type="text" id="stock-search" placeholder="Filtrer par nom ou marque…">
        </div>
        <select class="filter-select" id="stock-filter-status">
          <option value="">Tous les statuts</option>
          <option value="out">Rupture</option>
          <option value="low">Stock faible</option>
          <option value="ok">En stock</option>
        </select>
        <select class="filter-select" id="stock-filter-brand"><option value="">Toutes les marques</option></select>
        <button class="btn-refresh" id="btn-refresh" onclick="doRefresh()">
          <i class="fas fa-sync-alt"></i> Actualiser
        </button>
        <div style="margin-left:auto;display:flex;gap:8px" id="stock-quick-stats"></div>
      </div>

      <div class="stock-grid" id="stock-grid">
        <div class="stock-loading"><i class="fas fa-spinner fa-spin"></i><p>Chargement depuis PostgreSQL…</p></div>
      </div>

    </main>
  </div>

  <!-- Movement Modal -->
  <div class="modal-overlay" id="movement-modal">
    <div class="modal" style="width:460px">
      <div class="modal-header">
        <div class="modal-title" id="mv-title">Mouvement de stock</div>
        <div class="modal-close" onclick="Modal.close('movement-modal')"><i class="fas fa-times"></i></div>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group span-2"><label class="form-label">Produit</label><input class="form-input" id="mv-product-name" readonly></div>
          <div class="form-group">
            <label class="form-label">Type</label>
            <select class="form-select" id="mv-type"><option value="in">Entrée (réception)</option></select>
          </div>
          <div class="form-group"><label class="form-label">Taille</label><select class="form-select" id="mv-size"><option value="">Toutes</option></select></div>
          <div class="form-group"><label class="form-label">Quantité *</label><input class="form-input" id="mv-qty" type="number" min="1" value="1"></div>
          <div class="form-group"><label class="form-label">Note</label><input class="form-input" id="mv-note" placeholder="ex: Réception fournisseur…"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="Modal.close('movement-modal')">Annuler</button>
        <button class="btn btn-primary" id="btn-apply-mv" onclick="applyMovement()"><i class="fas fa-save"></i> Enregistrer</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="config.js?v=9"></script>
  <script src="assets/js/api.js?v=7"></script>
  <script src="assets/js/store.js?v=9"></script>
  <script src="assets/js/db.js?v=9"></script>
  <script src="assets/js/app.js?v=9"></script>
  <script>
    initPage('Gestion stock', 'Inventaire');

    if (Auth.isAdmin()) {
      document.getElementById('mv-type').innerHTML +=
        '<option value="out">Sortie (vente)</option>' +
        '<option value="adjust">Ajustement</option>';
    }

    let _mvProdId = null;

    /* ── Quick stats ──────────────────────────────────────────── */
    function renderQuickStats() {
      const s = AppStore.getStats();
      document.getElementById('stock-quick-stats').innerHTML = `
        <div class="alert-pill${s.outOfStock>0?' danger':' success'}">
          <i class="fas fa-exclamation-circle"></i> ${s.outOfStock} rupture${s.outOfStock!==1?'s':''}
        </div>
        <div class="alert-pill${s.lowStock>0?' warning':' success'}">
          <i class="fas fa-exclamation-triangle"></i> ${s.lowStock} faible${s.lowStock!==1?'s':''}
        </div>`;
    }

    /* ── Brand filter ─────────────────────────────────────────── */
    function populateBrands() {
      const brands = [...new Set(AppStore.get('products').map(p => p.brand))].sort();
      const sel = document.getElementById('stock-filter-brand'), cur = sel.value;
      sel.innerHTML = '<option value="">Toutes les marques</option>' +
        brands.map(b => `<option value="${b}"${b===cur?' selected':''}>${b}</option>`).join('');
    }

    /* ── Render stock grid ─────────────────────────────────────── */
    function renderStock() {
      const search  = document.getElementById('stock-search').value.toLowerCase().trim();
      const statusF = document.getElementById('stock-filter-status').value;
      const brandF  = document.getElementById('stock-filter-brand').value;

      // ✅ Lire depuis AppStore — jamais localStorage pour les données métier
      const filtered = AppStore.get('products').filter(p => {
        if (search  && !p.name.toLowerCase().includes(search) && !p.brand.toLowerCase().includes(search)) return false;
        if (brandF  && p.brand !== brandF) return false;
        if (statusF && DB.helpers.stockStatus(p.qty) !== statusF) return false;
        return true;
      });

      const grid = document.getElementById('stock-grid');

      if (!filtered.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
          <i class="fas fa-box-open"></i>
          <h3>${AppStore.get('products').length===0?'Aucun produit en base':'Aucun produit trouvé'}</h3>
          <p>${AppStore.get('products').length===0?'Ajoutez un produit.':'Modifiez vos filtres.'}</p>
        </div>`;
        renderQuickStats();
        return;
      }

      grid.innerHTML = filtered.map(p => {
        // ✅ Tailles depuis AppStore (chargées depuis /api/sizes/:id)
        const sizes   = AppStore.getSizesFor(p.id);
        const st      = DB.helpers.stockStatus(p.qty);
        const hasOut  = sizes.some(s => s.qty === 0);
        const hasLow  = sizes.some(s => s.qty > 0 && s.qty <= 2);
        const cls     = hasOut ? 'stock-card has-out' : hasLow ? 'stock-card has-low' : 'stock-card';

        const sizeCells = sizes.map(s => {
          const c = s.qty===0?'out':s.qty<=2?'low':'';
          return `<div class="stock-size-item ${c}">
            <div class="stock-size-num">${s.size}</div>
            <div class="qty-control">
              <button class="qty-btn" onclick="adjustSize(${p.id},${s.size},-1)"
                ${!Auth.isAdmin()?'disabled style="opacity:.35;cursor:not-allowed"':''}>−</button>
              <span class="qty-val" id="qv-${p.id}-${s.size}">${s.qty}</span>
              <button class="qty-btn" onclick="adjustSize(${p.id},${s.size},+1)">+</button>
            </div>
          </div>`;
        }).join('');

        const imgHtml = typeof p.img === 'string' && p.img.startsWith('data:')
          ? `<div class="stock-card-img"><img src="${p.img}" alt="${p.name}"></div>`
          : `<div class="stock-card-img">${p.img||'👟'}</div>`;

        return `<div class="${cls}" id="card-${p.id}">
          <div class="stock-card-header">
            ${imgHtml}
            <div>
              <div class="stock-card-name">${p.name}</div>
              <div class="stock-card-brand">${p.brand} · <span style="font-size:10px;color:var(--text-dim)">${p.sku}</span></div>
            </div>
          </div>
          <div class="stock-sizes-grid">
            ${sizeCells||'<div style="color:var(--text-dim);font-size:12px;grid-column:1/-1;text-align:center;padding:8px">Aucune taille</div>'}
          </div>
          <div class="stock-card-footer">
            <span class="stock-badge ${st}">${DB.helpers.stockLabel(st)}</span>
            <div style="display:flex;align-items:center;gap:8px">
              <button class="btn btn-ghost btn-sm" onclick="openMovementModal(${p.id})">
                <i class="fas fa-exchange-alt"></i> Mouvement
              </button>
              <span class="stock-total" id="stot-${p.id}">${p.qty} u.</span>
            </div>
          </div>
        </div>`;
      }).join('');

      renderQuickStats();
      populateBrands();
    }

    /* ── Adjust size +/- ─────────────────────────────────────── */
    async function adjustSize(productId, size, delta) {
      if (delta < 0 && !Auth.isAdmin()) {
        Toast.error('Les sorties sont réservées aux administrateurs.');
        return;
      }

      // Optimistic UI update
      const qvEl = document.getElementById(`qv-${productId}-${size}`);
      const totEl = document.getElementById(`stot-${productId}`);
      if (qvEl) qvEl.textContent = Math.max(0, (parseInt(qvEl.textContent)||0) + delta);

      try {
        // ✅ Via AppStore → API → SQLite → event 'stock:updated' → renderStock()
        const r = await AppStore.actions.adjustSize(productId, size, delta);
        if (totEl) totEl.textContent = `${r.total} u.`;
        // Les cards se mettent à jour via l'event automatiquement
        Toast.success(`Taille ${size} mise à jour.`);
      } catch(e) {
        // Rollback optimistic
        if (qvEl) qvEl.textContent = Math.max(0, (parseInt(qvEl.textContent)||0) - delta);
        Toast.error('Erreur: ' + e.message);
      }
    }

    /* ── Movement Modal ──────────────────────────────────────── */
    function openMovementModal(productId) {
      const p = AppStore.getProduct(productId);
      if (!p) return;
      _mvProdId = productId;

      document.getElementById('mv-title').textContent       = `Mouvement — ${p.name}`;
      document.getElementById('mv-product-name').value      = `${p.name} (${p.sku})`;
      document.getElementById('mv-qty').value  = 1;
      document.getElementById('mv-note').value = '';

      const sSel  = document.getElementById('mv-size');
      const sizes = AppStore.getSizesFor(productId);
      sSel.innerHTML = '<option value="">Toutes</option>';
      sizes.forEach(s => sSel.innerHTML += `<option value="${s.size}">${s.size}</option>`);
      Modal.open('movement-modal');
    }

    async function applyMovement() {
      const p    = AppStore.getProduct(_mvProdId);
      const type = document.getElementById('mv-type').value;
      const size = document.getElementById('mv-size').value ? +document.getElementById('mv-size').value : null;
      const qty  = parseInt(document.getElementById('mv-qty').value) || 0;
      const note = document.getElementById('mv-note').value.trim();

      if (!qty || qty < 1) { Toast.error('Quantité invalide.'); return; }
      if ((type==='out'||type==='adjust') && !Auth.isAdmin()) {
        Toast.error('Réservé aux administrateurs.'); Modal.close('movement-modal'); return;
      }

      const btn = document.getElementById('btn-apply-mv');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> …';

      try {
        // ✅ Via AppStore → API → SQLite → events → renderStock() auto
        await AppStore.actions.addMovement({
          product_id: _mvProdId, product_name: p?.name||'', brand: p?.brand||'',
          size, type, quantity: qty, note: note || DB.helpers.mvLabel(type),
        });
        Modal.close('movement-modal');
        Toast.success('Mouvement enregistré.');
      } catch(e) {
        Toast.error('Erreur: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save"></i> Enregistrer';
      }
    }

    /* ── Refresh button ──────────────────────────────────────── */
    async function doRefresh() {
      const btn = document.getElementById('btn-refresh');
      btn.classList.add('loading');
      try {
        await AppStore.actions.refreshAll();
        await AppStore.actions.loadAllSizes();
        Toast.success('Données rechargées.');
      } finally {
        btn.classList.remove('loading');
      }
    }

    /* ── Event Listeners ─────────────────────────────────────── */
    document.getElementById('stock-search').addEventListener('input', renderStock);
    document.getElementById('stock-filter-status').addEventListener('change', renderStock);
    document.getElementById('stock-filter-brand').addEventListener('change', renderStock);
    Modal.bindBackdrop('movement-modal');

    // ✅ Écouter les events AppStore → re-render automatique sans rechargement de page
    AppStore.on('products:updated', () => { renderStock(); Sidebar.updateBadges(); });
    AppStore.on('stock:updated',    () => renderStock());
    AppStore.on('stats:updated',    () => renderQuickStats());
    AppStore.on('data:loaded',      () => renderStock());
    AppStore.on('error', e => Toast.error(e.detail?.message || 'Erreur'));

    /* ── Boot ─────────────────────────────────────────────────── */
    DB.onReady(async (mode) => {
      await AppStore.init(mode);
      // Charger les tailles pour chaque produit depuis /api/sizes/:id
      await AppStore.actions.loadAllSizes();
      renderStock();
      // Auto-sync toutes les 30s (silent background refresh)
      AppStore.startPolling(30000);
    });
  </script>
</body>
</html>
