<!DOCTYPE html>
<!--
  BEN AMI SHOP — Movements History (movements.html)
  Displays all stock movements (in/out/adjust) with filters,
  and provides a modal to add a new movement manually.
-->
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mouvements — Ben Ami Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">

  <style>
    /* Movement type filter pills */
    .type-pills {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .type-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--t-fast);
    }

    .type-pill.active,
    .type-pill:hover { border-color: var(--border-2); color: var(--text); }
    .type-pill[data-type="in"].active    { background: var(--success-dim); border-color: rgba(34,197,94,0.35); color: var(--success); }
    .type-pill[data-type="out"].active   { background: var(--danger-dim);  border-color: rgba(239,68,68,0.35); color: var(--danger); }
    .type-pill[data-type="adjust"].active{ background: var(--blue-dim);    border-color: rgba(59,130,246,0.35);color: var(--blue); }

    /* Summary cards */
    .mv-summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 22px;
    }

    .mv-sum-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .mv-sum-icon {
      width: 38px;
      height: 38px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .mv-sum-count {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
    }

    .mv-sum-label { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
  </style>
</head>
<body>

  <aside class="sidebar" id="sidebar"></aside>

  <div class="main-wrapper">
    <header class="topbar" id="topbar"></header>

    <main class="page-content">

      <div class="page-header">
        <h1>Historique des mouvements</h1>
        <p>Toutes les entrées, sorties et ajustements de stock</p>
      </div>

      <!-- Summary row -->
      <div class="mv-summary">
        <div class="mv-sum-card">
          <div class="mv-sum-icon" style="background:var(--success-dim);color:var(--success)">
            <i class="fas fa-arrow-down"></i>
          </div>
          <div>
            <div class="mv-sum-count" id="count-in">—</div>
            <div class="mv-sum-label">Entrées</div>
          </div>
        </div>
        <div class="mv-sum-card">
          <div class="mv-sum-icon" style="background:var(--danger-dim);color:var(--danger)">
            <i class="fas fa-arrow-up"></i>
          </div>
          <div>
            <div class="mv-sum-count" id="count-out">—</div>
            <div class="mv-sum-label">Sorties</div>
          </div>
        </div>
        <div class="mv-sum-card">
          <div class="mv-sum-icon" style="background:var(--blue-dim);color:var(--blue)">
            <i class="fas fa-arrows-alt-v"></i>
          </div>
          <div>
            <div class="mv-sum-count" id="count-adj">—</div>
            <div class="mv-sum-label">Ajustements</div>
          </div>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="toolbar" style="margin-bottom:14px">
        <!-- Type filter pills -->
        <div class="type-pills">
          <div class="type-pill active" data-type="" onclick="setTypeFilter(this, '')">
            <i class="fas fa-list"></i> Tous
          </div>
          <div class="type-pill" data-type="in" onclick="setTypeFilter(this, 'in')">
            <i class="fas fa-arrow-down"></i> Entrées
          </div>
          <div class="type-pill" data-type="out" onclick="setTypeFilter(this, 'out')">
            <i class="fas fa-arrow-up"></i> Sorties
          </div>
          <div class="type-pill" data-type="adjust" onclick="setTypeFilter(this, 'adjust')">
            <i class="fas fa-arrows-alt-v"></i> Ajustements
          </div>
        </div>

        <!-- Product filter -->
        <select class="filter-select" id="filter-product" style="margin-left:auto">
          <option value="">Tous les produits</option>
        </select>

        <!-- Add movement button -->
        <button class="btn btn-primary" onclick="openAddMv()" data-role="admin">
          <i class="fas fa-plus"></i> Nouveau mouvement
        </button>
      </div>

      <!-- Movements List -->
      <div class="table-wrapper" id="mv-list"></div>

    </main>
  </div>

  <!-- ── ADD MOVEMENT MODAL ─────────────────────────────────────── -->
  <div class="modal-overlay" id="add-mv-modal">
    <div class="modal" style="width:480px">
      <div class="modal-header">
        <div class="modal-title">Nouveau mouvement de stock</div>
        <div class="modal-close" onclick="Modal.close('add-mv-modal')"><i class="fas fa-times"></i></div>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group span-2">
            <label class="form-label">Produit *</label>
            <select class="form-select" id="new-mv-product">
              <option value="">Sélectionner un produit…</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Type de mouvement *</label>
            <select class="form-select" id="new-mv-type">
              <option value="in">Entrée (réception)</option>
              <!-- Options sortie et ajustement visibles seulement pour l'admin (injectées en JS) -->
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Taille</label>
            <select class="form-select" id="new-mv-size">
              <option value="">Toutes les tailles</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Quantité *</label>
            <input class="form-input" id="new-mv-qty" type="number" min="1" value="1">
          </div>
          <div class="form-group">
            <label class="form-label">Note / Motif</label>
            <input class="form-input" id="new-mv-note" placeholder="ex: Réception fournisseur Mars">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="Modal.close('add-mv-modal')">Annuler</button>
        <button class="btn btn-primary" onclick="saveNewMv()">
          <i class="fas fa-save"></i> Enregistrer
        </button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <!-- ── SCRIPTS ────────────────────────────────────────────────── -->
  <script src="assets/js/db.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    /* ── Movements Page Logic ──────────────────────────────────── */

    initPage('Mouvements', 'Historique');

    /* Compléter le select de type selon le rôle */
    const mvTypeEl = document.getElementById('new-mv-type');
    if (Auth.isAdmin()) {
      mvTypeEl.innerHTML += '<option value="out">Sortie (vente / perte)</option>';
      mvTypeEl.innerHTML += '<option value="adjust">Ajustement manuel</option>';
    }

    let typeFilter = ''; // '', 'in', 'out', 'adjust'

    /* ── Summary counts ─────────────────────────────────────── */
    function renderSummary() {
      const all = DB.movements.getAll();
      document.getElementById('count-in').textContent  = all.filter(m => m.type === 'in').length;
      document.getElementById('count-out').textContent = all.filter(m => m.type === 'out').length;
      document.getElementById('count-adj').textContent = all.filter(m => m.type === 'adjust').length;
    }

    /* ── Type filter pills ──────────────────────────────────── */
    function setTypeFilter(el, type) {
      document.querySelectorAll('.type-pill').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      typeFilter = type;
      renderList();
    }

    /* ── Populate product filter ─────────────────────────────── */
    function populateProductFilter() {
      const sel = document.getElementById('filter-product');
      const cur = sel.value;
      sel.innerHTML = '<option value="">Tous les produits</option>' +
        DB.products.getAll().map(p =>
          `<option value="${p.id}"${p.id == cur ? ' selected' : ''}>${p.name}</option>`
        ).join('');
    }

    /* ── Render movements list ───────────────────────────────── */
    function renderList() {
      const productId = document.getElementById('filter-product').value;

      let movements = DB.movements.getAll().filter(m => {
        if (typeFilter  && m.type !== typeFilter)          return false;
        if (productId   && m.product_id !== +productId)    return false;
        return true;
      });

      const container = document.getElementById('mv-list');

      if (!movements.length) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-exchange-alt"></i>
            <h3>Aucun mouvement trouvé</h3>
            <p>Les entrées et sorties apparaîtront ici.</p>
          </div>`;
        return;
      }

      const icons  = { in: 'fa-arrow-down', out: 'fa-arrow-up', adjust: 'fa-arrows-alt-v' };
      const labels = { in: 'Entrée', out: 'Sortie', adjust: 'Ajust.' };

      container.innerHTML = `<div>` + movements.map(m => `
        <div class="movement-row">
          <div class="mv-type-icon ${m.type}">
            <i class="fas ${icons[m.type] || 'fa-circle'}"></i>
          </div>

          <div class="mv-info">
            <div class="mv-product">
              ${m.product_name}
              ${m.size ? `<span class="mv-size-label">· Taille ${m.size}</span>` : ''}
            </div>
            <div class="mv-note">${m.note || labels[m.type] || m.type}</div>
          </div>

          <!-- Type badge -->
          <div style="flex-shrink:0">
            <span class="stock-badge ${m.type === 'in' ? 'ok' : m.type === 'out' ? 'out' : 'low'}" style="font-size:11px">
              ${labels[m.type] || m.type}
            </span>
          </div>

          <div class="mv-meta">
            <div class="mv-qty ${m.type}">${m.type === 'out' ? '−' : '+'}${m.quantity}</div>
            <div class="mv-date">${DB.helpers.formatDate(m.moved_at)}</div>
          </div>
        </div>
      `).join('') + `</div>`;
    }

    /* ── Add Movement Modal ──────────────────────────────────── */
    function openAddMv() {
      // Populate product dropdown
      const pSel = document.getElementById('new-mv-product');
      pSel.innerHTML = '<option value="">Sélectionner un produit…</option>' +
        DB.products.getAll().map(p =>
          `<option value="${p.id}">${p.name}</option>`
        ).join('');

      // Reset size list when product changes
      pSel.onchange = function () {
        const p = DB.products.getById(this.value);
        const sSel = document.getElementById('new-mv-size');
        sSel.innerHTML = '<option value="">Toutes les tailles</option>';
        if (p && p.sizes) {
          p.sizes.forEach(s => sSel.innerHTML += `<option value="${s}">${s}</option>`);
        }
      };

      document.getElementById('new-mv-qty').value  = 1;
      document.getElementById('new-mv-note').value = '';

      Modal.open('add-mv-modal');
    }

    function saveNewMv() {
      const productId = +document.getElementById('new-mv-product').value;
      const type      = document.getElementById('new-mv-type').value;
      const size      = document.getElementById('new-mv-size').value ? +document.getElementById('new-mv-size').value : null;
      const qty       = parseInt(document.getElementById('new-mv-qty').value) || 0;
      const note      = document.getElementById('new-mv-note').value.trim();

      if (!productId) { Toast.error('Sélectionnez un produit.'); return; }
      if (!qty || qty < 1) { Toast.error('Quantité invalide.'); return; }

      const p = DB.products.getById(productId);

      // Apply movement (updates stock + sizes)
      DB.movements.apply(productId, size, type, qty, note || DB.helpers.mvLabel(type), p.name);

      Modal.close('add-mv-modal');
      renderSummary();
      renderList();
      populateProductFilter();
      Sidebar.updateBadges();
      Toast.success('Mouvement enregistré avec succès !');
    }

    /* ── Event Listeners ─────────────────────────────────────── */
    document.getElementById('filter-product').addEventListener('change', renderList);
    Modal.bindBackdrop('add-mv-modal');

    /* ── Init ────────────────────────────────────────────────── */
    renderSummary();
    populateProductFilter();
    renderList();
  </script>

</body>
</html>
