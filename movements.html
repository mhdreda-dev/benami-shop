<!DOCTYPE html>
<!-- BEN AMI SHOP — movements.html v3 — Architecture SaaS (AppStore) -->
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mouvements — Ben Ami Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .type-pills { display:flex; gap:6px; flex-wrap:wrap; }
    .type-pill { display:inline-flex; align-items:center; gap:6px; padding:6px 14px; border-radius:var(--radius-pill); border:1px solid var(--border); background:var(--surface); color:var(--text-muted); font-size:12px; font-weight:500; cursor:pointer; transition:all .15s; }
    .type-pill.active,.type-pill:hover { border-color:var(--border-2); color:var(--text); }
    .type-pill[data-type="in"].active    { background:var(--success-dim); border-color:rgba(34,197,94,.35); color:var(--success); }
    .type-pill[data-type="out"].active   { background:var(--danger-dim);  border-color:rgba(239,68,68,.35); color:var(--danger); }
    .type-pill[data-type="adjust"].active{ background:var(--blue-dim);    border-color:rgba(59,130,246,.35); color:var(--blue); }
    .mv-summary { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:22px; }
    .mv-sum-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px 20px; display:flex; align-items:center; gap:14px; }
    .mv-sum-icon { width:38px; height:38px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
    .mv-sum-count { font-family:'Syne',sans-serif; font-size:24px; font-weight:800; line-height:1; }
    .mv-sum-label { font-size:12px; color:var(--text-muted); margin-top:3px; }
  </style>
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-wrapper">
    <header class="topbar" id="topbar"></header>
    <main class="page-content">

      <div class="page-header">
        <h1>Historique des mouvements</h1>
        <p>Toutes les entrées, sorties et ajustements de stock</p>
      </div>

      <div class="mv-summary">
        <div class="mv-sum-card">
          <div class="mv-sum-icon" style="background:var(--success-dim);color:var(--success)"><i class="fas fa-arrow-down"></i></div>
          <div><div class="mv-sum-count" id="count-in">—</div><div class="mv-sum-label">Entrées</div></div>
        </div>
        <div class="mv-sum-card">
          <div class="mv-sum-icon" style="background:var(--danger-dim);color:var(--danger)"><i class="fas fa-arrow-up"></i></div>
          <div><div class="mv-sum-count" id="count-out">—</div><div class="mv-sum-label">Sorties</div></div>
        </div>
        <div class="mv-sum-card">
          <div class="mv-sum-icon" style="background:var(--blue-dim);color:var(--blue)"><i class="fas fa-arrows-alt-v"></i></div>
          <div><div class="mv-sum-count" id="count-adj">—</div><div class="mv-sum-label">Ajustements</div></div>
        </div>
      </div>

      <div class="toolbar" style="margin-bottom:14px">
        <div class="type-pills">
          <div class="type-pill active" data-type="" onclick="setFilter(this,'')"><i class="fas fa-list"></i> Tous</div>
          <div class="type-pill" data-type="in"     onclick="setFilter(this,'in')"><i class="fas fa-arrow-down"></i> Entrées</div>
          <div class="type-pill" data-type="out"    onclick="setFilter(this,'out')"><i class="fas fa-arrow-up"></i> Sorties</div>
          <div class="type-pill" data-type="adjust" onclick="setFilter(this,'adjust')"><i class="fas fa-arrows-alt-v"></i> Ajust.</div>
        </div>
        <select class="filter-select" id="filter-product" style="margin-left:auto"><option value="">Tous les produits</option></select>
        <button class="btn btn-primary" onclick="openAddMv()" id="btn-new-mv" data-role="admin" style="display:none">
          <i class="fas fa-plus"></i> Nouveau mouvement
        </button>
      </div>

      <div class="table-wrapper" id="mv-list">
        <div style="padding:2rem;text-align:center;color:var(--text-muted)">
          <i class="fas fa-spinner fa-spin"></i> Chargement…
        </div>
      </div>

    </main>
  </div>

  <!-- Add Movement Modal -->
  <div class="modal-overlay" id="add-mv-modal">
    <div class="modal" style="width:480px">
      <div class="modal-header">
        <div class="modal-title">Nouveau mouvement de stock</div>
        <div class="modal-close" onclick="Modal.close('add-mv-modal')"><i class="fas fa-times"></i></div>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group span-2"><label class="form-label">Produit *</label><select class="form-select" id="new-mv-product"><option value="">Sélectionner…</option></select></div>
          <div class="form-group"><label class="form-label">Type *</label><select class="form-select" id="new-mv-type"><option value="in">Entrée</option></select></div>
          <div class="form-group"><label class="form-label">Taille</label><select class="form-select" id="new-mv-size"><option value="">Toutes</option></select></div>
          <div class="form-group"><label class="form-label">Quantité *</label><input class="form-input" id="new-mv-qty" type="number" min="1" value="1"></div>
          <div class="form-group"><label class="form-label">Note</label><input class="form-input" id="new-mv-note" placeholder="ex: Réception fournisseur"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="Modal.close('add-mv-modal')">Annuler</button>
        <button class="btn btn-primary" id="btn-save-mv" onclick="saveNewMv()"><i class="fas fa-save"></i> Enregistrer</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="config.js?v=9"></script>
  <script src="assets/js/api.js?v=7"></script>
  <script src="assets/js/store.js?v=9"></script>
  <script src="assets/js/db.js?v=9"></script>
  <script src="assets/js/app.js?v=9"></script>
  <script>
    initPage('Mouvements', 'Historique');

    let _typeFilter = '';

    if (Auth.isAdmin()) {
      document.getElementById('btn-new-mv').style.display = '';
      const sel = document.getElementById('new-mv-type');
      sel.innerHTML += '<option value="out">Sortie</option><option value="adjust">Ajustement</option>';
    }

    /* ── Render summary ──────────────────────────────────────── */
    function renderSummary() {
      const mvs = AppStore.get('movements');
      document.getElementById('count-in').textContent  = mvs.filter(m => m.type==='in').length;
      document.getElementById('count-out').textContent = mvs.filter(m => m.type==='out').length;
      document.getElementById('count-adj').textContent = mvs.filter(m => m.type==='adjust').length;
    }

    /* ── Populate product filter ─────────────────────────────── */
    function populateProductFilter() {
      const products = AppStore.get('products');
      const sel = document.getElementById('filter-product');
      const cur = sel.value;
      sel.innerHTML = '<option value="">Tous les produits</option>' +
        products.map(p => `<option value="${p.id}"${p.id==cur?' selected':''}>${p.name}</option>`).join('');
    }

    /* ── Render movements list ───────────────────────────────── */
    function renderList() {
      const productId = document.getElementById('filter-product').value;
      const mvs = AppStore.get('movements').filter(m => {
        if (_typeFilter && m.type !== _typeFilter) return false;
        if (productId  && m.product_id != +productId) return false;
        return true;
      });

      const container = document.getElementById('mv-list');
      if (!mvs.length) {
        container.innerHTML = `<div class="empty-state">
          <i class="fas fa-exchange-alt"></i>
          <h3>Aucun mouvement</h3><p>Les entrées et sorties apparaîtront ici.</p>
        </div>`;
        return;
      }

      const icons  = { in:'fa-arrow-down', out:'fa-arrow-up', adjust:'fa-arrows-alt-v' };
      const labels = { in:'Entrée', out:'Sortie', adjust:'Ajust.' };

      container.innerHTML = '<div>' + mvs.map(m => `
        <div class="movement-row">
          <div class="mv-type-icon ${m.type}"><i class="fas ${icons[m.type]||'fa-circle'}"></i></div>
          <div class="mv-info">
            <div class="mv-product">
              ${m.product_name||'—'}
              ${m.size?`<span class="mv-size-label">· Taille ${m.size}</span>`:''}
              ${m.brand?`<span class="mv-size-label" style="color:var(--text-dim)">· ${m.brand}</span>`:''}
            </div>
            <div class="mv-note">${m.note||labels[m.type]||m.type}</div>
          </div>
          <div style="flex-shrink:0">
            <span class="stock-badge ${m.type==='in'?'ok':m.type==='out'?'out':'low'}" style="font-size:11px">
              ${labels[m.type]||m.type}
            </span>
          </div>
          <div class="mv-meta">
            <div class="mv-qty ${m.type}">${m.type==='out'?'−':'+'}${m.quantity}</div>
            <div class="mv-date">${DB.helpers.formatDate(m.moved_at)}</div>
          </div>
        </div>`).join('') + '</div>';
    }

    /* ── Full render ─────────────────────────────────────────── */
    function renderAll() {
      renderSummary();
      populateProductFilter();
      renderList();
    }

    function setFilter(el, type) {
      document.querySelectorAll('.type-pill').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      _typeFilter = type;
      renderList();
    }

    /* ── Add Movement Modal ──────────────────────────────────── */
    function openAddMv() {
      const products = AppStore.get('products');
      const pSel = document.getElementById('new-mv-product');
      pSel.innerHTML = '<option value="">Sélectionner un produit…</option>' +
        products.map(p => `<option value="${p.id}">${p.name}</option>`).join('');

      pSel.onchange = function() {
        const p = AppStore.getProduct(+this.value);
        const sSel = document.getElementById('new-mv-size');
        sSel.innerHTML = '<option value="">Toutes les tailles</option>';
        (p?.sizes || []).forEach(s => sSel.innerHTML += `<option value="${s}">${s}</option>`);
      };

      document.getElementById('new-mv-qty').value  = 1;
      document.getElementById('new-mv-note').value = '';
      Modal.open('add-mv-modal');
    }

    async function saveNewMv() {
      const productId = +document.getElementById('new-mv-product').value;
      const type      = document.getElementById('new-mv-type').value;
      const size      = document.getElementById('new-mv-size').value ? +document.getElementById('new-mv-size').value : null;
      const qty       = parseInt(document.getElementById('new-mv-qty').value) || 0;
      const note      = document.getElementById('new-mv-note').value.trim();

      if (!productId) { Toast.error('Sélectionnez un produit.'); return; }
      if (!qty || qty < 1) { Toast.error('Quantité invalide.'); return; }

      const p   = AppStore.getProduct(productId);
      const btn = document.getElementById('btn-save-mv');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> …';

      try {
        // ✅ Via AppStore → API → SQLite → event → render auto
        await AppStore.actions.addMovement({
          product_id:   productId,
          product_name: p?.name  || '',
          brand:        p?.brand || '',
          size, type, quantity: qty,
          note: note || DB.helpers.mvLabel(type),
        });
        Modal.close('add-mv-modal');
        Toast.success('Mouvement enregistré !');
        // renderAll() appelé automatiquement via 'movements:updated'
      } catch(e) {
        Toast.error('Erreur: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save"></i> Enregistrer';
      }
    }

    /* ── Events ──────────────────────────────────────────────── */
    document.getElementById('filter-product').addEventListener('change', renderList);
    Modal.bindBackdrop('add-mv-modal');

    // ✅ Écouter les events AppStore → re-render automatique
    AppStore.on('movements:updated', () => renderAll());
    AppStore.on('products:updated',  () => populateProductFilter());
    AppStore.on('data:loaded',       () => renderAll());
    AppStore.on('error', e => Toast.error(e.detail?.message || 'Erreur'));

    /* ── Boot ─────────────────────────────────────────────────── */
    DB.onReady(async (mode) => {
      await AppStore.init(mode);
      renderAll();
      AppStore.startPolling(60000);
    });
  </script>
</body>
</html>
